<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Portfolio Projects</title>
  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial;
      text-align: center;
      margin: 0;
    }
    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }
    .card {
      margin: 30px 0;
      padding: 15px;
      background: #1b1b1b;
      border-radius: 10px;
    }
    video, iframe {
      width: 100%;
      height: 450px;
      border-radius: 10px;
      border: 0;
    }
  </style>
</head>

<body>
<div class="container">

<h1>Sample Project Work</h1>

<!-- LOCAL VIDEO -->
<div class="card">
  <h2>Project 1 — 3D Sample</h2>
  <video controls>
    <source src="Videos/sample-project.mp4" type="video/mp4">
  </video>
</div>

<!-- YOUTUBE VIDEO 1 -->
<div class="card">
  <h2>Project 2 — Horror Scene</h2>
  <iframe
    src="https://www.youtube.com/embed/D500JHclqxs"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    allowfullscreen>
  </iframe>
</div>

<!-- YOUTUBE VIDEO 2 -->
<div class="card">
  <h2>Project 3 — Editor View</h2>
  <iframe
    src="https://www.youtube.com/embed/0_AX0Yn5bhc"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    allowfullscreen>
  </iframe>
</div>

</div>
</body>
</html>
